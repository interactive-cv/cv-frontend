name: frontend CI

# CI прогоняется на всех ветках и PR — проверка качества перед merge.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
      - run: npx next build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
